# training/config/detector/efficientnetb4_sfdct.yaml
# Hybrid Spatial–Frequency (block-wise DCT) detector = the thesis method.
# Mirrors efficientnetb4.yaml / efficientnetb4_dct.yaml EXACTLY except the marked SFDCT lines,
# so the ablation A(B4)->...->C/D(SFDCT) is fair. Keep batch / lr / seed / aug IDENTICAL across configs.
# SMOKE vs FULL: change the 3 lines tagged [SMOKE].

log_dir: logs/evaluations/effnb4_sfdct

# model setting
pretrained: ./training/pretrained/efficientnet-b4-6ed6700e.pth
model_name: efficientnetb4_hff      # MUST match @DETECTOR.register_module(module_name=...)
backbone_name: efficientnetb4

# Block-DCT-HFF module params (read by EfficientHFFDetector / sfdct_hff_core)
dct_channels: 1792                  # B4 final feature channels (HF stream output ch == this)
dct_grid: 8                         # HF stream output grid (== B4 final 8x8 @256px)
residual_source: blockdct           # 'blockdct' (ours, block-DCT high-pass residual) | 'srm' (control, off-title)
dct_drop_low_bands: 3               # block-DCT high-pass: zero DC + (k-1) lowest zigzag bands (mid/high residual)
hff_multi_scale: true               # R3 (full)=true ; R1 (minimal)=false  -- HFF multi-scale on the residual stream
hff_use_rsa: true                   # R3 (full)=true ; R1 (minimal)=false  -- residual-guided spatial attention
hff_lr_mult: 3.0                    # warm-up LR x base_lr for the new modules (stream+rsa+gate); backbone at base_lr
# Floor: HFFGate alpha zero-init => model == B4 at init (verified by tools/smoke_hff.py).
# ABLATION:  R1 -> set hff_multi_scale:false, hff_use_rsa:false  |  R3 (default here) -> both true.
scl_weight: 0.3                    # single-center loss weight
scl_margin: 0.3                    # single-center margin (scaled by sqrt(D) internally)

# backbone setting
backbone_config:
  num_classes: 2
  inc: 3
  dropout: false
  mode: Original

# dataset
all_dataset: [FaceForensics++, FF-F2F, FF-DF, FF-FS, FF-NT, FaceShifter, DeepFakeDetection, Celeb-DF-v1, Celeb-DF-v2, DFDCP, DFDC, DeeperForensics-1.0, UADFV]
train_dataset: [FaceForensics++]                 # full FF++ (4 manipulations + real)
test_dataset: [FaceForensics++, Celeb-DF-v2]     # within-domain + cross-domain

# >>> PROTOCOL FIDELITY (to reproduce the DeepfakeBench leaderboard) <<<
# The official EfficientB4 row was trained on the FULL FF++ split: 719 videos/manip
# (3596 train videos, ~115k frames). The repo default train_config.yaml points at
# './dataset_json_compare' = ONLY 25 videos/manip (~4k frames, 3.5% of data) -- that is a
# LOCAL SMOKE subset and will NOT reproduce the published AUC. Override it here for FULL runs:
dataset_json_folder: ./preprocessing/dataset_json   # FULL FF++/Celeb-DF jsons (719 vids/manip)
# [SMOKE] to run a quick local check instead: ./dataset_json_compare  (25 vids/manip)

compression: c23
train_batchSize: 32          # OFFICIAL protocol = 32 ; keep SAME across all ablation configs
test_batchSize: 32           # OFFICIAL = 32
workers: 8                   # OFFICIAL = 8 (was 4; speed only, no AUC effect)
frame_num: {'train': 32, 'test': 32}   # OFFICIAL = 32/32 ; [SMOKE] -> {'train': 4, 'test': 4}
resolution: 256
with_mask: false
with_landmark: false
save_ckpt: true
save_feat: false

# data augmentation (config B onward; for config A baseline set use_data_augmentation: false)
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# normalization
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

# optimizer (batch 32 <-> lr 0.0002 ; if you change batch, re-scale lr)
optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false
  sgd:
    lr: 0.0002
    momentum: 0.9
    weight_decay: 0.0005

# training
lr_scheduler: null
nEpochs: 10                  # [SMOKE] -> 1
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
manualSeed: 1024             # ablation seeds: 1024 / 2025 / 7
loss_func: cross_entropy
losstype: null

# metric
metric_scoring: auc

# cuda
cuda: true
cudnn: true
