mode: train
lmdb: False                       # raw RGB frames (NOT lmdb). lmdb:True would redirect json to the EMPTY dataset_json_v3 -> crash.
dry_run: false
rgb_dir: './datasets'             # start.sh sets this to the absolute datasets/ path
lmdb_dir:  './datasets/lmdb'
dataset_json_folder: './preprocessing/dataset_json' # FULL FF++/CDF (719 vids/manip)
SWA: False
save_avg: True
log_dir: ./logs/training/
# label settings
label_dict:
  # DFD
  DFD_fake: 1
  DFD_real: 0
  # FF++ + FaceShifter(FF-real+FF-FH)
  FF-SH: 1
  FF-F2F: 1
  FF-DF: 1
  FF-FS: 1
  FF-NT: 1
  FF-FH: 1
  FF-real: 0
  # CelebDF
  CelebDFv1_real: 0
  CelebDFv1_fake: 1
  CelebDFv2_real: 0
  CelebDFv2_fake: 1
  # DFDCP
  DFDCP_Real: 0
  DFDCP_FakeA: 1
  DFDCP_FakeB: 1
  # DFDC
  DFDC_Fake: 1
  DFDC_Real: 0
  # DeeperForensics-1.0
  DF_fake: 1
  DF_real: 0
  # UADFV
  UADFV_Fake: 1
  UADFV_Real: 0
  # Roop
  roop_Real: 0
  roop_Fake: 1